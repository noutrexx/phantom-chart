name: Feature request
description: Suggest an improvement for Phantom Eats
title: "Feature: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What should feel better or more complete?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the UI, behavior, or flow you want.
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Add references, screenshots, or tradeoffs.
